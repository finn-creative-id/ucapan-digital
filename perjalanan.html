<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perjalanan Kita</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Outfit:wght@300;400;600;800&family=Dancing+Script:wght@400;600;700&display=swap" rel="stylesheet">
    <!-- Tailwind via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                        cursive: ['Great Vibes', 'cursive'],
                        latin: ['Dancing Script', 'cursive']
                    },
                    colors: {
                        brand: { dark: '#0f0c29', main: '#ff758c', secondary: '#ff7eb3' }
                    }
                }
            }
        }
    </script>
    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
    
    <style>
        /* Film Roll Styles */
        .film-roll-container {
            width: 100vw;
            overflow: hidden;
            position: relative;
            left: 50%;
            right: 50%;
            margin-left: -50vw;
            margin-right: -50vw;
            box-shadow: 0 30px 60px rgba(0,0,0,0.2);
            background-color: #1a1a1a;
            transform: rotate(-1.5deg);
            margin-top: 5rem;
            margin-bottom: 5rem;
        }
        
        .film-track {
            display: flex;
            width: max-content;
            background-color: #181818;
            /* Perforations top and bottom via SVG */
            background-image: 
                url("data:image/svg+xml,%3Csvg width='25' height='20' xmlns='http://www.w3.org/2000/svg'%3E%3Crect width='12' height='14' x='6.5' y='3' rx='2' fill='%23ebe2d2'/%3E%3C/svg%3E"),
                url("data:image/svg+xml,%3Csvg width='25' height='20' xmlns='http://www.w3.org/2000/svg'%3E%3Crect width='12' height='14' x='6.5' y='3' rx='2' fill='%23ebe2d2'/%3E%3C/svg%3E");
            background-position: top 5px left 0, bottom 5px left 0;
            background-repeat: repeat-x, repeat-x;
            padding: 40px 0;
            animation: scrollFilm 40s linear infinite;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
        }
        
        .film-frame {
            width: 320px;
            height: 220px;
            margin-right: 30px; /* Unit size = 320 + 30 = 350px */
            flex-shrink: 0;
            background: #fdfdfd;
            border-radius: 12px;
            padding: 6px;
            position: relative;
        }
        
        .film-frame::before {
            content: attr(data-num);
            position: absolute;
            top: -25px;
            left: 10px;
            color: #ebe2d2;
            font-family: 'Courier New', monospace;
            font-size: 11px;
            opacity: 0.6;
            letter-spacing: 2px;
        }
        
        .film-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 6px;
            filter: sepia(0.15) contrast(1.1);
            transition: filter 0.3s ease;
        }

        .film-frame:hover img {
            filter: sepia(0) contrast(1);
        }
        
        @keyframes scrollFilm {
            0% { transform: translateX(0); }
            100% { transform: translateX(-1750px); } /* Exactly 5 items * 350px */
        }
    </style>
</head>
<body class="bg-[linear-gradient(rgba(235,226,210,0.85),rgba(235,226,210,0.85)),url('images/vintage_paper.png')] bg-fixed bg-cover bg-center text-[#3e2a1e] font-sans antialiased min-h-screen">
    
    <!-- Navbar (Optional, to go back) -->
    <nav class="w-full py-6 bg-transparent">
        <div class="max-w-[1200px] mx-auto px-6 md:px-8">
            <a href="index.html" class="font-cursive text-2xl md:text-3xl text-[#8a2531] no-underline font-bold transition-transform hover:scale-105 inline-block">&larr; Kembali ke Beranda</a>
        </div>
    </nav>

    <main class="py-10 px-8 max-w-6xl mx-auto text-center overflow-x-hidden">
        <h1 class="font-latin text-5xl md:text-7xl text-[#8a2531] mb-2 drop-shadow-sm">Perjalanan Kita</h1>
        <p class="text-xl md:text-2xl text-[#3e2a1e]/80 italic font-serif mt-4 mb-8">
            Merekam setiap detik memori indah kita...
        </p>

        <!-- Continuous Film Roll Component -->
        <div class="film-roll-container">
            <div class="film-track">
                <!-- Set 1 (5 frames) -->
                <div class="film-frame" data-num="KODAK 400  1"><img src="images/hero_pic_1.png" alt="Film Memory"></div>
                <div class="film-frame" data-num="KODAK 400  2"><img src="images/hero_pic_2.png" alt="Film Memory"></div>
                <div class="film-frame" data-num="KODAK 400  3"><img src="images/hero_pic_3.png" alt="Film Memory"></div>
                <div class="film-frame" data-num="KODAK 400  4"><img src="images/bouquet.png" alt="Film Memory"></div>
                <div class="film-frame" data-num="KODAK 400  5"><img src="images/couple.png" alt="Film Memory"></div>
                
                <!-- Set 2 (Identical 5 frames for seamless loop) -->
                <div class="film-frame" data-num="KODAK 400  1"><img src="images/hero_pic_1.png" alt="Film Memory"></div>
                <div class="film-frame" data-num="KODAK 400  2"><img src="images/hero_pic_2.png" alt="Film Memory"></div>
                <div class="film-frame" data-num="KODAK 400  3"><img src="images/hero_pic_3.png" alt="Film Memory"></div>
                <div class="film-frame" data-num="KODAK 400  4"><img src="images/bouquet.png" alt="Film Memory"></div>
                <div class="film-frame" data-num="KODAK 400  5"><img src="images/couple.png" alt="Film Memory"></div>
            </div>
        </div>

        <p class="text-lg md:text-xl text-[#3e2a1e]/70 font-light mt-16 max-w-2xl mx-auto leading-relaxed">
            Halaman ini didedikasikan untuk menyimpan cerita manis kita. Setiap foto menyimpan ribuan kata yang tak bisa diucapkan begitu saja.
        </p>
    </main>

    <!-- Image Modal -->
    <div id="imageModal" class="fixed inset-0 z-50 flex items-center justify-center bg-black/80 opacity-0 pointer-events-none transition-opacity duration-300 backdrop-blur-sm p-4">
        <div class="relative w-full max-w-4xl p-2 md:p-4 bg-white/10 rounded-2xl shadow-2xl transform scale-95 transition-transform duration-300 flex justify-center" id="modalContent">
            <span class="absolute top-0 right-0 md:-top-4 md:-right-4 bg-[#8a2531] text-white w-10 h-10 flex items-center justify-center rounded-full cursor-pointer text-xl font-bold shadow-lg hover:bg-[#5c1a24] transition-colors z-10" onclick="closeModal()">&times;</span>
            <img id="modalImg" src="" alt="Popup Image" class="w-auto h-auto max-w-full max-h-[85vh] object-contain rounded-xl shadow-[0_0_40px_rgba(0,0,0,0.5)]">
        </div>
    </div>

    <script>
        const modal = document.getElementById('imageModal');
        const modalImg = document.getElementById('modalImg');
        const modalContent = document.getElementById('modalContent');
        const images = document.querySelectorAll('.film-frame img');

        images.forEach(img => {
            img.style.cursor = 'pointer';
            img.addEventListener('click', () => {
                modalImg.src = img.src;
                modal.classList.remove('opacity-0', 'pointer-events-none');
                modalContent.classList.remove('scale-95');
                modalContent.classList.add('scale-100');
            });
        });

        function closeModal() {
            modal.classList.add('opacity-0', 'pointer-events-none');
            modalContent.classList.remove('scale-100');
            modalContent.classList.add('scale-95');
        }

        // Close on background click
        modal.addEventListener('click', (e) => {
            if (e.target === modal) {
                closeModal();
            }
        });
    </script>
</body>
</html>
